---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
- "@MC_CONTROLLER_INSTALL_PREFIX@/baseline_walking_controller/states"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_CONTROLLER_INSTALL_PREFIX@/baseline_walking_controller/states/data"
# If true, state factory will be more verbose
VerboseStateFactory: false

# General constraints, always on
constraints:
- type: contact
- type: kinematics
  damper: [0.1, 0.01, 0.5]
- type: compoundJoint

# Collision constraint
collisions:
- type: collision
  useMinimal: true

# Initial set of contacts
contacts: []

# ============================================================
# BWC configuration
# ============================================================

controllerName: GraspFSM

PostureTask:
  stiffness: 10

CoMTask:
  type: com
  stiffness: [1000.0, 1000.0, 1000.0]
  weight: 1000.0

BaseOrientationTask:
  type: orientation
  stiffness: 300.0
  weight: 500.0

FootTaskList:
  - type: firstOrderImpedance
    foot: Left
    frame: LeftFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0
  - type: firstOrderImpedance
    foot: Right
    frame: RightFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0

FootManager:
  name: FootManager
  footstepDuration: 0.8 # [sec]
  doubleSupportRatio: 0.125 # []
  deltaTransLimit: [0.15, 0.1, 12.5] # (x [m], y [m], theta [deg])
  midToFootTranss:
    Left:
      translation: [0, 0.105, 0] # [m]
    Right:
      translation: [0, -0.105, 0] # [m]
  footTaskGain:
    stiffness: 1000.0
  zmpHorizon: 2.0 # [sec]
  zmpOffset: [0, -0.02, 0] # [m]
  defaultSwingTrajType: IndHorizontalVertical
  overwriteLandingPose: false
  stopSwingTrajForTouchDownFoot: true
  keepPoseForTouchDownFoot: false
  enableWrenchDistForTouchDownFoot: true
  enableArmSwing: false
  fricCoeff: 0.5
  touchDownRemainingDuration: 0.2 # [sec]
  touchDownPosError: 0.02 # [m]
  touchDownForceZ: 100 # [N]
  impedanceGains:
    SingleSupport:
      damper:
        linear: [300, 300, 300]
        angular: [100, 100, 100]
      spring:
        linear: [2250, 2250, 2250]
        angular: [0, 0, 2000]
      wrench:
        linear: [0, 0, 0]
        angular: [1, 1, 0]
    DoubleSupport:
      damper:
        linear: [300, 300, 1e4]
        angular: [100, 100, 100]
      spring:
        linear: [2250, 2250, 0]
        angular: [0, 0, 2000]
      wrench:
        linear: [0, 0, 1]
        angular: [1, 1, 0]
    Swing:
      damper:
        linear: [300, 300, 300]
        angular: [40, 40, 40]
      spring:
        linear: [2250, 2250, 2250]
        angular: [400, 400, 400]
      wrench:
        linear: [0, 0, 0]
        angular: [0, 0, 0]
  VelMode:
    footstepQueueSize: 3
    enableOnlineFootstepUpdate: true
  SwingTraj:
    CubicSplineSimple:
      withdrawDurationRatio: 0.25
      withdrawOffset: [0, 0, 0.015] # [m]
      approachDurationRatio: 0.25
      approachOffset: [0, 0, 0.015] # [m]
      swingOffset: [0, 0, 0.05] # [m]
    IndHorizontalVertical:
      withdrawDurationRatio: 0.25
      approachDurationRatio: 0.25
      verticalTopDurationRatio: 0.5
      verticalTopOffset: [0, 0, 0.05] # [m]
      tiltAngleWithdraw: 20 # [deg]
      tiltAngleApproach: 10 # [deg]
      tiltAngleWithdrawDurationRatio: 0.25
      tiltAngleApproachDurationRatio: 0.25
      tiltCenterWithdrawDurationRatio: 0.25
      tiltCenterApproachDurationRatio: 0.25
      tiltDistThre: 0.2 # [m]
      tiltForwardAngleThre: 10 # [deg]

CentroidalManager:
  name: CentroidalManager
  useActualStateForMpc: false
  enableZmpFeedback: true
  enableComZFeedback: true
  dcmGainP: 2.0
  zmpVelGain: 0.02
  comZGainP: 2000.0
  comZGainD: 500.0
  refComZ: 0.9 # [m] (HRP5P default)
  useTargetPoseForControlRobotAnchorFrame: true
  useActualComForWrenchDist: false
  actualComOffset: [0.0, 0.0, 0.0]
  wrenchDistConfig:
    wrenchWeight:
      linear: [1.0, 1.0, 1.0]
      angular: [1.0, 1.0, 1.0]
    regularWeight: 1e-8
    ridgeForceMinMax: [3, 1000] # [N]
  method: PreviewControlZmp
  horizonDuration: 2.0 # [sec]
  horizonDt: 0.005 # [sec]
  reinitForRefComZ: true

# ============================================================
# FSM States (defaults for HRP5P)
# Robot-specific overrides are merged via robots/<name>/states
# ============================================================

states:
  BWC::Initial_:
    base: BWC::Initial
    configs:
      autoStartTime: 2.0

  WalkForward:
    base: BWC::ConfigWalk
    configs:
      footMidpose:
        target: [2.5, 0, 0] # (x [m], y [m], theta [deg])

  MoveHand:
    base: MetaTasks
    tasks:
      transform:
        type: bspline_trajectory
        frame: RightHand
        duration: 5.0
        weight: 1000.0
        stiffness: 50.0
        target:
          translation: [2.8, -0.24, 1.0]
          rotation: [-1.57, 1.57, -3.14]
        controlPoints:
        [
          [2.8, -0.24, 0.9],
        ]
        completion:
          timeElapsed: true

  MoveHandBack:
    base: MetaTasks
    tasks:
      transform:
        type: bspline_trajectory
        frame: RightHand
        duration: 5.0
        weight: 1000.0
        stiffness: 50.0
        target:
          translation: [2.8, -0.24, 1.0]
          rotation: [-1.57, 1.57, -3.14]
        controlPoints:
        [
          [3.1, -0.24, 0.9],
        ]
        completion:
          timeElapsed: true

  GraspStance:
    base: MetaTasks
    tasks:
      transform:
        type: bspline_trajectory
        frame: RightHand
        duration: 3.0
        weight: 1000.0
        stiffness: 50.0
        target:
          translation: [3.12, -0.24, 0.90]
          rotation: [-1.57, 1.57, -3.14]
        completion:
          timeElapsed: true

  ReachObject:
    base: MetaTasks
    tasks:
      transform:
        type: bspline_trajectory
        frame: RightHand
        duration: 3.0
        weight: 1000.0
        stiffness: 50.0
        target:
          translation: [3.12, -0.10, 0.90]
          rotation: [-1.57, 1.57, -3.14]
        completion:
          timeElapsed: true

  LiftObject:
    base: MetaTasks
    tasks:
      transform:
        type: bspline_trajectory
        frame: RightHand
        duration: 4.0
        weight: 1000.0
        stiffness: 50.0
        target:
          translation: [3.12, -0.08, 1.45]
          rotation: [-1.57, 1.57, -3.14]
        completion:
          timeElapsed: true

  OpenGripper:
    base: Grippers
    grippers:
      r_gripper:
        opening: 1

  CloseGripper:
    base: Grippers
    grippers:
      r_gripper:
        opening: 0.

  ObjectPickUp:
    base: Meta
    transitions:
      - [MoveHand, OK, GraspStance, Auto]
      - [GraspStance, OK, OpenGripper, Auto]
      - [OpenGripper, OK, ReachObject, Auto]
      - [ReachObject, OK, CloseGripper, Auto]
      - [CloseGripper, OK, LiftObject, Auto]
    configs:
      OpenGripper:
        tasks:
          holdHand:
            type: transform
            frame: RightHand
            weight: 1000.0
            stiffness: 50.0
            target:
              translation: [3.12, -0.24, 0.90]
              rotation: [-1.57, 1.57, -3.14]
      CloseGripper:
        tasks:
          holdHand:
            type: transform
            frame: RightHand
            weight: 1000.0
            stiffness: 50.0
            target:
              translation: [3.12, -0.10, 0.90]
              rotation: [-1.57, 1.57, -3.14]

  ObjectPutDown:
    base: Meta
    transitions:
      - [ReachObject, OK, OpenGripper, Auto]
      - [OpenGripper, OK, GraspStance, Auto]
      - [GraspStance, OK, CloseGripper, Auto]
      - [CloseGripper, OK, MoveHandBack, Auto]
    configs:
      OpenGripper:
        tasks:
          holdHand:
            type: transform
            frame: RightHand
            weight: 1000.0
            stiffness: 50.0
            target:
              translation: [3.12, -0.10, 0.90]
              rotation: [-1.57, 1.57, -3.14]
      CloseGripper:
        tasks:
          holdHand:
            type: transform
            frame: RightHand
            weight: 1000.0
            stiffness: 50.0
            target:
              translation: [3.12, -0.24, 0.90]
              rotation: [-1.57, 1.57, -3.14]

  FSM::HalfSitting:
    base: HalfSitting
    eval: 0.001

  FSM::DemoFSM:
    base: Meta
    transitions:
      - [Pause, OK, WalkForward, Auto]
      - [WalkForward, OK, WaitForWalk, Auto]
      - [WaitForWalk, OK, ObjectPickUp, Auto]
      - [ObjectPickUp, OK, ObjectPutDown, Auto]
      - [ObjectPutDown, OK, FSM::HalfSitting, Auto]
    configs:
      Pause:
        duration: 2

# ============================================================
# Transitions map
# ============================================================

transitions:
  - [BWC::Initial_, OK, FSM::DemoFSM, Auto]

init: BWC::Initial_

# ============================================================
# Observer Pipeline
# ============================================================

ObserverPipelines:
  name: MainObserverPipeline
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
      required: false
    - type: KinematicInertial
      config:
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.05 # [m]
    - type: BodySensor
      update: false

# ============================================================
# Robot-specific configuration
# The controller merges robots/<name>/states into the top-level
# states before FSM parsing, so per-robot frame names and target
# positions are supported.
# ============================================================

robots:
  ground:
    module: env/ground

  # --- HRP5P ---
  hrp5_p:
    PostureTask:
      jointWeights:
        WP: 50
        WR: 50

    CoMTask:
      activeJoints: [
      "Root",
      "LCY", "LCR", "LCP", "LKP", "LAP", "LAR",
      "RCY", "RCR", "RCP", "RKP", "RAP", "RAR"]

    BaseOrientationTask:
      frame: Chest_Link2

    FootManager:
      footstepDuration: 0.9 # [sec]
      doubleSupportRatio: 0.15 # []
      impedanceGains:
        SingleSupport:
          spring:
            linear: [2250, 2250, 450]

    CentroidalManager:
      dcmGainP: 2.0
      comZGainP: 20000.0
      refComZ: 0.95 # [m]
      method: PreviewControlZmp
      horizonDuration: 2.0 # [sec]
      horizonDt: 0.002 # [sec]
